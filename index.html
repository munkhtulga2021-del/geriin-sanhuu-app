    /* ==================== Premium visual refresh ==================== */
    :root{
      --bg:#f3f6fc;--surface:rgba(255,255,255,.93);--ink:#11213d;--ink2:#3c4c66;--muted:#71809a;

        radial-gradient(760px 500px at 106% 15%,rgba(92,214,190,.13),transparent 60%),

    function formatPriceDate(iso){

    function parsePxValues(json){
      if(Array.isArray(json?.value)) return json.value;
      if(json?.value && typeof json.value==='object') return Object.keys(json.value).sort((a,b)=>Number(a)-Number(b)).map(k=>json.value[k]);
      return [];
    }
    function pxIndexMap(dimension, code){
      const idx=dimension?.[code]?.category?.index;
      if(Array.isArray(idx)) return new Map(idx.map((v,i)=>[v,i]));
      if(idx && typeof idx==='object') return new Map(Object.entries(idx));
      return new Map();
    }
    function statValueAt(json, ids, positions){
      const sizes=json.size||ids.map(id=>Object.keys(json.dimension?.[id]?.category?.index||{}).length);
      let flat=0,mul=1;
      for(let i=ids.length-1;i>=0;i--){ flat+=(positions[i]||0)*mul; mul*=sizes[i]||1; }
      return parsePxValues(json)[flat];
    }

    function fuelNumber(v){ const n=Number(String(v??'').replace(/[^0-9]/g,'')); return n>=1000&&n<=9000?n:null; }
    function compactFuelText(v=''){ return String(v).replace(/\u00a0/g,' ').replace(/\s+/g,' ').trim(); }
    function cleanFuelName(v=''){ return compactFuelText(v).replace(/^\d+\s*/,'').trim(); }
    function mapFuelRow(cells){
      const clean=cells.map(compactFuelText); if(clean.length<4) return null;
      const stationNo=/^\d{1,3}$/.test(clean[0])?0:-1;
      const offset=stationNo===0?1:0;
      const name=cleanFuelName(clean[offset]); const location=clean[offset+1]||'';
      if(!/^ШТС/i.test(name)) return null;
      const products=clean.slice(offset+2).map(fuelNumber);
      const positives=products.filter(Number.isFinite); if(!positives.length) return null;
      return {name,location,ai92:products[0]||null,euro92:products[1]||null,ai95:products[2]||null,ai98:products[3]||null,diesel:products[4]||null,euroDiesel:products[5]||null,rapidDiesel:products[6]||null,provider:'Шунхлай'};
    }
    function parseFuelHtml(raw){
      const doc=new DOMParser().parseFromString(raw,'text/html');
      const table=[...doc.querySelectorAll('table')].find(t=>/АИ\s*-?\s*92/i.test(t.textContent||''));
      if(!table) return [];
      const rows=[...table.querySelectorAll('tr')].map(tr=>[...tr.querySelectorAll('th,td')].map(td=>td.textContent||''));
      const rowsOut=rows.map(mapFuelRow).filter(Boolean);
      return rowsOut.filter((x,i,a)=>a.findIndex(y=>y.name===x.name&&y.location===x.location)===i);
    }
    function parseFuelReaderText(raw){
      const t=String(raw||'').replace(/\r/g,'');
      const cut=t.search(/№\s*ШТС\s*БАЙРШИЛ/i); const body=cut>=0?t.slice(cut):t;
      const chunks=body.split(/(?=^\s*\d{1,3}\s+ШТС)/m).filter(s=>/^\s*\d{1,3}\s+ШТС/m.test(s));
      const placePattern=/\b(УБ\s*хот|Улаанбаатар|Төв аймаг|Булган аймаг|Хэнтий аймаг|Өвөрхангай аймаг|Баянхонгор аймаг|Архангай аймаг|Дундговь аймаг|Өмнөговь аймаг|Увс аймаг|Говь-Алтай аймаг|Баян-Өлгий аймаг|Ховд аймаг|Дорнод аймаг|Сүхбаатар аймаг|Говьсүмбэр аймаг|Дорноговь аймаг|Дархан-Уул аймаг|Сэлэнгэ аймаг|Орхон аймаг|Хөвсгөл аймаг|Завхан аймаг|Багануур)/i;
      const out=[];
      for(const chunk of chunks){
        const first=chunk.match(/^\s*\d{1,3}\s+(ШТС[^\n]*)/m)?.[1]||'';
        const priceMatch=[...chunk.matchAll(/\b[2-5]\d{3}\b/g)];
        if(!first||!priceMatch.length) continue;
        const placeMatch=chunk.match(placePattern); const firstPriceIndex=priceMatch[0].index??chunk.length;
        let name=first,location='';
        if(placeMatch&&placeMatch.index!==undefined){
          const onFirst=first.search(placePattern);
          if(onFirst>=0) name=first.slice(0,onFirst).trim();
          else name=first.trim();
          location=compactFuelText(chunk.slice(placeMatch.index,firstPriceIndex));
        }else name=first.trim();
        name=cleanFuelName(name); if(!/^ШТС/i.test(name)) continue;
        const nums=priceMatch.map(m=>Number(m[0])); const later=nums.slice(1);
        const ai95=later.find(n=>n>=3900&&n<4250)||null;
        const diesel=[...later].reverse().find(n=>n>=4200&&n<4900)||null;
        out.push({name,location,ai92:nums[0]||null,ai95,diesel,provider:'Шунхлай'});
      }
      return out.filter((x,i,a)=>a.findIndex(y=>y.name===x.name&&y.location===x.location)===i);
    }
    async function fetchFuelSource(){
      const target=CONFIG.FUEL_STATION_SOURCE;
      const attempts=[
        `https://api.allorigins.win/raw?url=${encodeURIComponent(target)}`,
        `https://corsproxy.io/?${encodeURIComponent(target)}`,
        `https://r.jina.ai/http://www.shunkhlai.mn/prices`
      ];
      let lastError;
      for(const url of attempts){
        try{ const ctrl=new AbortController(), timer=setTimeout(()=>ctrl.abort(),18000); const res=await fetch(url,{cache:'no-store',signal:ctrl.signal}); clearTimeout(timer); if(!res.ok) throw new Error(`HTTP ${res.status}`); const raw=await res.text(); const items=/r\.jina\.ai/i.test(url)?parseFuelReaderText(raw):parseFuelHtml(raw); if(items.length>=10) return items; throw new Error('Станцын хүснэгт танигдсангүй.'); }catch(err){ lastError=err; }
      }
      throw lastError||new Error('ШТС мэдээлэл татагдсангүй.');
    }
    async function loadFuelPrices(force=false){
      if(state.fuelLoading)return;
      if(!force&&!state.fuelIsFallback&&state.fuelStations.length&&Date.now()-state.fuelFetchedAt<CONFIG.FUEL_REFRESH_MS)return;
      state.fuelLoading=true;state.fuelError='';syncHeader();renderFuelPrices();
      try{ const items=await fetchFuelSource(); state.fuelStations=items;state.fuelFetchedAt=Date.now();state.fuelIsFallback=false;store.set('gerdans-live-fuel-stations',{items,fetchedAt:state.fuelFetchedAt}); }
      catch(err){ state.fuelError=''; state.fuelIsFallback=true; if(!state.fuelStations.length) state.fuelStations=FALLBACK_FUEL_STATIONS.slice(); console.warn(err); }
      state.fuelLoading=false;syncHeader();renderFuelPrices();
    }

    function loanRateText(p){ return p.rateLabel || (p.rateMin===p.rateMax ? `${p.rateMin}% / сар` : `${p.rateMin}%–${p.rateMax}% / сар`); }

    function resetLoanForProduct(providerId, productId){ const prov=LOAN_PROVIDERS.find(x=>x.id===providerId)||LOAN_PROVIDERS[0]; const prod=prov.products.find(x=>x.id===productId)||prov.products[0]; state.loanProviderId=prov.id; state.loanProductId=prod.id; state.loanAmount=prod.amountMin; state.loanTerm=prod.termMin; state.loanRate=prod.rateDefault; state.loanView='calc'; }
    function getLoanCalc(){ const p=getLoanProduct(); const amount=Math.max(p.amountMin,Math.min(p.amountMax,Number(state.loanAmount)||p.amountMin)); const term=Math.max(p.termMin,Math.min(p.termMax,Math.round(Number(state.loanTerm)||p.termMin))); const rate=Number(p.rateMax)||0; const fee=Math.round(amount*(Number(p.feeRate)||0)/100)+(Number(p.feeFixed)||0); let monthly=0,totalInterest=0,totalPayment=0,schedule=[]; if(p.termUnit==='day'){totalInterest=Math.round(amount*(rate/100)*(term/30));totalPayment=amount+totalInterest+fee;monthly=totalPayment;schedule=[{n:1,label:`${term} хоногийн дотор`,payment:totalPayment,interest:totalInterest,principal:amount,balance:0}];}else{const r=rate/100,n=term;monthly=r===0?amount/n:amount*(r*Math.pow(1+r,n))/(Math.pow(1+r,n)-1);let balance=amount;for(let i=1;i<=n;i++){let interest=r===0?0:balance*r;let principal=r===0?amount/n:monthly-interest;if(i===n){principal=balance;monthly=principal+interest;}balance=Math.max(0,balance-principal);schedule.push({n:i,label:`${i}-р сар`,payment:Math.round(monthly),interest:Math.round(interest),principal:Math.round(principal),balance:Math.round(balance)});}totalInterest=Math.round(schedule.reduce((a,x)=>a+x.interest,0));totalPayment=Math.round(amount+totalInterest+fee);monthly=Math.round(schedule[0]?.payment||0);} return {p,amount,term,rate,fee,monthly:Math.round(monthly),totalInterest,totalPayment,schedule}; }
    function getEligibility(calc){ const income=Number(state.loanIncome)||0,debt=Math.max(0,Number(state.loanDebt)||0),age=Number(state.loanAge)||0,work=Math.max(0,Number(state.loanWorkMonths)||0); if(!income)return {cls:'warn',title:'Орлогоо оруулж урьдчилсан үнэлгээ харна уу',copy:'Энэ хэсэг нь зөвхөн сар бүрийн төлбөрийн даацын жишиг үнэлгээ. Аппын албан ёсны шийдвэр биш.',ratio:null};const paymentForRatio=calc.p.termUnit==='day'?calc.totalPayment:calc.monthly,ratio=((debt+paymentForRatio)/income)*100,ageIssue=age&&(age<18||age>70),workIssue=work&&work<3;if(ageIssue)return {cls:'bad',title:'Насны шалгуур хангахгүй байж магадгүй',copy:'Олон үйлчилгээ 18+ насны иргэн байхыг шаарддаг. Тухайн байгууллагын шалгуурыг давхар шалгана.',ratio};if(ratio<=45&&!workIssue)return {cls:'good',title:'Урьдчилсан байдлаар төлбөрийн даац боломжийн',copy:`Өр, орлогын харьцаа ${ratio.toFixed(1)}%. Гэхдээ зээлийн түүх, скоринг, баталгаажуулалт эцсийн шийдвэрт нөлөөлнө.`,ratio};if(ratio<=60)return {cls:'warn',title:'Нэмэлт шалгуур шаардагдаж болзошгүй',copy:`Өр, орлогын харьцаа ${ratio.toFixed(1)}%. ${workIssue?'Тогтмол орлогын хугацаа богино байна. ':''}Хүсэх дүн эсвэл хугацаагаа өөрчилж үзээрэй.`,ratio};return {cls:'bad',title:'Одоогийн төлбөрийн ачаалал өндөр байна',copy:`Өр, орлогын харьцаа ${ratio.toFixed(1)}%. Хүсэх дүнг бууруулах, хугацааг уртасгах эсвэл одоогийн өрөө багасгах нь илүү бодитой байж болно.`,ratio}; }

    function updateLoanCalculatorOnly(){const root=$('#tab-loan');if(!root||state.loanView!=='calc')return;const calc=getLoanCalc(),p=calc.p,eligible=getEligibility(calc),interestPct=calc.totalPayment?Math.max(0,Math.min(100,calc.totalInterest/calc.totalPayment*100)):0,set=(id,val)=>{const e=$('#'+id,root);if(e)e.textContent=val;};set('loanAmountLabel',loanAmtText(calc.amount));set('loanTermLabel',loanTermText(p,calc.term));set('loanRateLabel',loanRateText(p));set('loanMonthlyPayment',loanAmtText(p.termUnit==='day'?calc.totalPayment:calc.monthly));set('loanPrincipal',loanAmtText(calc.amount));set('loanInterest',loanAmtText(calc.totalInterest));set('loanFee',loanAmtText(calc.fee));set('loanTotalPayment',loanAmtText(calc.totalPayment));const pie=$('#loanPie',root);if(pie)pie.style.background=`conic-gradient(#98b9ff 0 ${Math.max(1,100-interestPct)}%,#f04b3d ${Math.max(1,100-interestPct)}% 100%)`;set('loanPieCenter',Math.round(interestPct)+'% хүү');const stat=$('#eligibilityStatus',root);if(stat){stat.className='eligibility-status '+eligible.cls;set('eligibilityRatio',eligible.ratio===null?'—':eligible.ratio.toFixed(1)+'%');set('eligibilityTitle',eligible.title);set('eligibilityCopy',eligible.copy);}const body=$('#loanSchedule',root);if(body)body.innerHTML=calc.schedule.slice(0,6).map(x=>`<tr><td>${h(x.label)}</td><td>${loanAmtText(x.payment)}</td><td>${loanAmtText(x.interest)}</td><td>${loanAmtText(x.balance)}</td></tr>`).join('');}

    function render(){
      // Зөвхөн нээгдсэн хэсгийг render хийнэ. Ингэснээр өөр tab-ын live data
      // асуудал гарсан ч “Төлөлт” цэс хоосон болохгүй.
      $$('.tab').forEach(el=>el.classList.toggle('active',el.id==='tab-'+state.tab));
      $$('.tabbar button').forEach(b=>b.classList.toggle('active',b.dataset.tab===state.tab));
      syncHeader();
      try{
        if(state.tab==='dans') renderFinance();
        else if(state.tab==='hansh') renderRates();
        else if(state.tab==='weather') renderWeather();
        else if(state.tab==='price') renderPrices();
        else if(state.tab==='loan') renderLoan();
        else if(state.tab==='debts') renderDebtTracker();
      }catch(err){
        console.error('Render error:',err);
        const root=$('#tab-'+state.tab);
        if(root) root.innerHTML=`<section class="card" style="margin-top:8px;text-align:center;padding:28px 18px"><div style="font-size:30px;margin-bottom:9px">⚠</div><b style="display:block;font-size:15px">Энэ хэсгийг ачаалж чадсангүй</b><p style="margin:9px 0 0;color:var(--muted);font-size:12px;line-height:1.55">Хуудсыг нэг удаа дахин нээгээд үзээрэй. Өмнөх бүртгэлүүд browser дээр хадгалагдсан хэвээр байна.</p><button class="debt-primary" data-act="retry-current-tab" style="margin-top:14px">Дахин ачаалах</button></section>`;
      }
    }

    function defaultDayFor(ms){
      if(ms===monthOf(new Date())) return todayStr();
      const list=state.tx.filter(t=>t.date?.startsWith(ms)).map(t=>t.date).sort(); return list.length?list[list.length-1]:ms+'-01';
    }
    function openMonth(ms){ state.selMonth=ms;state.selDate=defaultDayFor(ms);state.confirmId=null;state.view='month';render(); }
    function addTransaction(){
      const amount=parseFloat($('#amountInput')?.value);if(!amount||amount<=0)return;
      const category=$('#categoryInput').value, desc=$('#descInput').value.trim();
      state.tx.push({id:Date.now()+'-'+Math.random().toString(36).slice(2,7),type:state.type,amount,category,desc,date:state.selDate});saveTx();render();
      setTimeout(()=>$('#amountInput')?.focus(),0);
    }
    function getFreshness(){ return {rates:Date.now()-state.ratesFetchedAt,weather:Date.now()-state.weatherFetchedAt,prices:Date.now()-state.pricesFetchedAt,fuel:Date.now()-state.fuelFetchedAt}; }

    async function loadRates(force=false){
      if(state.ratesLoading)return;
      if(!force&&state.rates&&Date.now()-state.ratesFetchedAt<CONFIG.RATES_REFRESH_MS)return;
      state.ratesLoading=true;state.ratesError='';syncHeader();renderRates();
      try{
        const controller=new AbortController(),timer=setTimeout(()=>controller.abort(),12000);
        const res=await fetch(CONFIG.RATES_API,{cache:'no-store',signal:controller.signal});clearTimeout(timer);
        if(!res.ok)throw new Error('Ханшийн сервер хариу өгсөнгүй.');
        const data=await res.json();if(!data?.rates?.MNT)throw new Error('Ханшийн мэдээлэл буруу байна.');
        state.rates=data.rates;state.ratesFetchedAt=Date.now();state.ratesUpdatedAt=data.time_last_update_unix?data.time_last_update_unix*1000:Date.now();
        store.set('gerdans-live-rates',{rates:state.rates,fetchedAt:state.ratesFetchedAt,updatedAt:state.ratesUpdatedAt});
      }catch(err){state.ratesError='Ханшийн live мэдээлэл татагдсангүй.';console.warn(err);}
      state.ratesLoading=false;syncHeader();renderRates();
    }
    async function loadWeather(force=false){
      if(state.weatherLoading)return;
      if(!force&&state.weather&&Date.now()-state.weatherFetchedAt<CONFIG.WEATHER_REFRESH_MS)return;
      const c=CITIES[state.cityIdx];state.weatherLoading=true;state.weatherError='';syncHeader();renderWeather();
      try{
        const q=new URLSearchParams({latitude:c.lat,longitude:c.lon,current:'temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m',daily:'weather_code,temperature_2m_max,temperature_2m_min',timezone:'auto',forecast_days:'7',wind_speed_unit:'kmh'});
        const controller=new AbortController(),timer=setTimeout(()=>controller.abort(),12000);
        const res=await fetch(`${CONFIG.WEATHER_API}?${q}`,{cache:'no-store',signal:controller.signal});clearTimeout(timer);
        if(!res.ok)throw new Error('Цаг агаарын сервер хариу өгсөнгүй.');
        const data=await res.json();if(!data?.current||!data?.daily)throw new Error('Цаг агаарын мэдээлэл буруу байна.');
        state.weather=data;state.weatherFetchedAt=Date.now();store.set('gerdans-live-weather',{data,cityIdx:state.cityIdx,fetchedAt:state.weatherFetchedAt});
      }catch(err){state.weatherError='Цаг агаарын live мэдээлэл татагдсангүй.';console.warn(err);}
      state.weatherLoading=false;syncHeader();renderWeather();
    }


    async function loadProductPrices(force=false){
      if(state.pricesLoading)return;
      if(!force&&state.prices.length&&Date.now()-state.pricesFetchedAt<CONFIG.PRICE_REFRESH_MS)return;
      state.pricesLoading=true;state.pricesError='';syncHeader();renderPrices();
      try{
        const controller=new AbortController(),timer=setTimeout(()=>controller.abort(),18000);
        const metaRes=await fetch(CONFIG.PRICE_META_API,{cache:'no-store',signal:controller.signal});
        if(!metaRes.ok)throw new Error('Үнийн сангийн мета мэдээлэл ирсэнгүй.');

        const vars=meta?.variables||[];
        const productVar=vars.find(v=>String(v.text||v.code).includes('Бүтээгдэхүүн'))||vars[0];
        const timeVar=vars.find(v=>String(v.text||v.code).includes('Хугацаа'))||vars[1];
        if(!productVar||!timeVar||!Array.isArray(productVar.values)||!Array.isArray(timeVar.values)||!timeVar.values.length)throw new Error('Үнийн сангийн бүтэц танигдсангүй.');
        const latest=timeVar.values[0], previous=timeVar.values[1]||timeVar.values[0];
        const query={query:[
          {code:productVar.code,selection:{filter:'all',values:['*']}},
          {code:timeVar.code,selection:{filter:'item',values:[latest,previous]}}
        ],response:{format:'json-stat2'}};
        const dataRes=await fetch(CONFIG.PRICE_META_API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(query),cache:'no-store',signal:controller.signal});
        clearTimeout(timer);
        if(!dataRes.ok)throw new Error('Үнийн мэдээлэл ирсэнгүй.');
        const data=await dataRes.json();
        const ids=data.id||[productVar.code,timeVar.code];
        const pPos=ids.indexOf(productVar.code), tPos=ids.indexOf(timeVar.code);
        if(pPos<0||tPos<0)throw new Error('Үнийн мэдээллийн багана танигдсангүй.');
        const pIndex=pxIndexMap(data.dimension,productVar.code), tIndex=pxIndexMap(data.dimension,timeVar.code);
        const latestIndex=Number(tIndex.get(latest)), previousIndex=Number(tIndex.get(previous));
        const labels=productVar.valueTexts||productVar.values;
        const items=productVar.values.map((code,i)=>{
          const positions=new Array(ids.length).fill(0);positions[pPos]=Number(pIndex.get(code));positions[tPos]=latestIndex;
          const current=statValueAt(data,ids,positions);positions[tPos]=previousIndex;
          const previousValue=statValueAt(data,ids,positions);const name=labels[i]||code;
          const lastComma=name.lastIndexOf(',');const unit=lastComma>-1?name.slice(lastComma+1).trim():'';
          return {name,unit,category:priceCategory(name),price:Number(current),previous:Number(previousValue)};
        }).filter(x=>Number.isFinite(x.price));
        if(!items.length)throw new Error('Үнийн мэдээлэл хоосон байна.');
        state.prices=items;state.pricesDate=latest;state.pricesPreviousDate=previous;state.pricesFetchedAt=Date.now();state.pricesIsFallback=false;
        store.set('gerdans-product-prices',{items,latestDate:latest,previousDate:previous,fetchedAt:state.pricesFetchedAt});
      }catch(err){state.pricesError='Барааны үнийн live мэдээлэл татагдсангүй.';console.warn(err);}
      state.pricesLoading=false;syncHeader();renderPrices();
    }

    /* ==================== Advanced debt repayment tracker ==================== */
    const DEBT_STORE_KEY='gerdans-debt-tracker-v1';
    const DEBT_MONTH_NAMES=['1-р сар','2-р сар','3-р сар','4-р сар','5-р сар','6-р сар','7-р сар','8-р сар','9-р сар','10-р сар','11-р сар','12-р сар'];
    const debtMonthKey=(start,index)=>{const m=String(start||monthOf(new Date())).match(/^(\d{4})-(\d{2})$/);const y=m?Number(m[1]):new Date().getFullYear(),mo=m?Number(m[2])-1:new Date().getMonth();const d=new Date(y,mo+index,1);return `${d.getFullYear()}-${pad(d.getMonth()+1)}`;};
    const debtMonthLabel=(key)=>{const [y,m]=String(key||'').split('-').map(Number);return y&&m?`${y} оны ${m}-р сар`:key;};
    const debtSelectedKey=()=>`${state.debtYear}-${pad(state.debtMonth)}`;
    const num=(v)=>Math.max(0,Number(String(v??'').replace(/,/g,'').replace(/[^0-9.]/g,''))||0);
    function normalizeDebt(d){
      const total=num(d?.total),monthly=num(d?.monthly);
      const legacyBank=String(d?.lender||'').trim();
      return {...d,total,monthly,bankName:String(d?.bankName||legacyBank||'').trim(),accountName:String(d?.accountName||'').trim(),accountNo:String(d?.accountNo||'').trim(),paid:Array.isArray(d?.paid)?d.paid.map(Boolean):[],startMonth:/^\d{4}-\d{2}$/.test(String(d?.startMonth||''))?d.startMonth:monthOf(new Date())};
    }
    function debtMonths(d){const n=normalizeDebt(d);return n.monthly>0?Math.max(1,Math.ceil(n.total/n.monthly)):0;}
    function debtPaymentAt(d,index){const n=normalizeDebt(d);const before=n.monthly*index;return Math.max(0,Math.min(n.monthly,n.total-before));}
    function debtPaidTotal(d){const n=normalizeDebt(d);return Array.from({length:debtMonths(n)},(_,i)=>n.paid[i]?debtPaymentAt(n,i):0).reduce((a,b)=>a+b,0);}
    function debtRemaining(d){const n=normalizeDebt(d);return Math.max(0,n.total-debtPaidTotal(n));}
    function debtProgress(d){const n=normalizeDebt(d);return n.total>0?Math.min(100,Math.round(debtPaidTotal(n)/n.total*100)):0;}
    function debtIndexForMonth(d,key){const n=normalizeDebt(d),count=debtMonths(n);for(let i=0;i<count;i++)if(debtMonthKey(n.startMonth,i)===key)return i;return -1;}
    function debtMonthInfo(d,key=debtSelectedKey()){
      const n=normalizeDebt(d),index=debtIndexForMonth(n,key);
      if(index<0)return {index:-1,amount:0,paid:false,applicable:false};
      return {index,amount:debtPaymentAt(n,index),paid:!!n.paid[index],applicable:true};
    }
    function debtCountForMonth(key){return (state.debts||[]).reduce((count,d)=>count+(debtIndexForMonth(d,key)>=0?1:0),0);}
    function debtDueForMonth(key){return (state.debts||[]).reduce((sum,d)=>{const info=debtMonthInfo(d,key);return sum+(info.applicable?info.amount:0);},0);}
    function debtPaidForMonth(key){return (state.debts||[]).reduce((sum,d)=>{const info=debtMonthInfo(d,key);return sum+(info.applicable&&info.paid?info.amount:0);},0);}
    function saveDebts(){state.debts=(Array.isArray(state.debts)?state.debts:[]).map(normalizeDebt);store.set(DEBT_STORE_KEY,state.debts);}
    function allDebtTotal(){return (state.debts||[]).reduce((s,d)=>s+normalizeDebt(d).total,0);}
    function allDebtRemaining(){return (state.debts||[]).reduce((s,d)=>s+debtRemaining(d),0);}
    function debtScheduleRows(d){
      const n=normalizeDebt(d),totalMonths=debtMonths(n),selected=debtSelectedKey();
      return Array.from({length:totalMonths},(_,i)=>{
        const key=debtMonthKey(n.startMonth,i),paid=!!n.paid[i],amount=debtPaymentAt(n,i),isSelected=key===selected;
        const label=debtMonthLabel(key),stateLabel=paid?'Төлсөн':isSelected?'Сонгосон':'Төлөөгүй';
        return `<button type="button" class="debt-schedule-row ${paid?'paid':''} ${isSelected?'selected':''}" data-debt-month="${key}"><span class="debt-schedule-date">${label}</span><b class="debt-schedule-amount">${fmt(amount)}₮</b><span class="debt-schedule-state">${stateLabel}</span></button>`;
      }).join('');
    }
    function debtMonthCalendar(){
      const selected=debtSelectedKey(),now=monthOf(new Date());
      const tabs=Array.from({length:12},(_,i)=>{
        const key=`${state.debtYear}-${pad(i+1)}`,due=debtDueForMonth(key),paid=debtPaidForMonth(key),count=debtCountForMonth(key),isDone=count>0&&paid>=due&&due>0;

        return `<button class="debt-month-tab ${key===selected?'active':''} ${key===now?'current':''} ${isDone?'done':''}" data-debt-month="${key}" aria-label="${debtMonthLabel(key)}"><small>${DEBT_MONTH_NAMES[i]}</small><b>${count?fmt(due)+'₮':'—'}</b><span>${isDone?'Бүгд төлсөн':label}</span></button>`;
      }).join('');
      return `<section class="card debt-calendar"><div class="debt-calendar-head"><div><span class="debt-calendar-eyebrow">ТӨЛӨЛТИЙН КАЛЕНДАР</span><h3 class="debt-calendar-title">${state.debtYear} он</h3></div><div class="debt-year-tools"><button class="debt-year-button" data-act="debt-prev-year" aria-label="Өмнөх жил">‹</button><button class="debt-current-button" data-act="debt-go-current">Энэ сар</button><button class="debt-year-button" data-act="debt-next-year" aria-label="Дараагийн жил">›</button></div></div><div class="debt-month-grid">${tabs}</div><div class="debt-calendar-help"><b>Сар сонго:</b> тухайн сар дээр дараад, тэр сарын төлөлтийг тус бүрээр нь бүртгэнэ.</div></section>`;
    }
    function debtMonthSummary(key){
      const due=debtDueForMonth(key),paid=debtPaidForMonth(key),count=debtCountForMonth(key),left=Math.max(0,due-paid);
      return `<section class="debt-month-summary"><div class="debt-month-summary-top"><div><div class="debt-month-summary-label">СОНГОСОН ТӨЛӨЛТИЙН САР</div><div class="debt-month-summary-title">${debtMonthLabel(key)}</div></div><span class="debt-month-summary-count">${count} зээл</span></div><div class="debt-month-stats"><div class="debt-month-stat"><span>Төлөх дүн</span><b>${fmt(due)}₮</b></div><div class="debt-month-stat paid"><span>Төлөгдсөн</span><b>${fmt(paid)}₮</b></div></div>${count?`<div style="margin-top:10px;font-size:10.5px;color:#7082a1">Үлдсэн сарын төлбөр: <b style="color:#254d88;font-family:var(--mono)">${fmt(left)}₮</b></div>`:`<div style="margin-top:10px;font-size:10.5px;color:#7082a1">Энэ сард төлөх хуваарьтай зээл алга.</div>`}</section>`;
    }
    function debtCard(d,key=debtSelectedKey()){
      const n=normalizeDebt(d),months=debtMonths(n),remaining=debtRemaining(n),progress=debtProgress(n),info=debtMonthInfo(n,key);
      const label=(n.name||'Зээл').trim(),bank=(n.bankName||n.lender||'Банк заагаагүй').trim(),accountName=(n.accountName||'Дансны нэр оруулаагүй').trim();
      const initials=(label[0]||'₮').toUpperCase();
      const paymentPanel=!info.applicable
        ? `<div class="debt-selected-payment"><div class="debt-payment-not-due"><b>${debtMonthLabel(key)}</b> дээр энэ зээлийн төлөлт байхгүй. Зээлийн эхлэх сар: ${debtMonthLabel(n.startMonth)}.</div></div>`
        : `<div class="debt-selected-payment"><div class="debt-selected-payment-head"><span>${debtMonthLabel(key)} · ${info.paid?'төлөлт бүртгэгдсэн':'төлөлт хүлээгдэж байна'}</span><b>${fmt(info.amount)}₮</b></div><button class="debt-payment-toggle ${info.paid?'paid':''}" data-debt-toggle="${h(n.id)}" data-debt-index="${info.index}" aria-label="${info.paid?'Төлөлтийг буцаах':'Төлсөн гэж бүртгэх'}"><span class="left"><b>${info.paid?'Төлсөн гэж бүртгэгдсэн':'Энэ сарын төлөлт'}</b><span>${info.paid?'Дахин дарвал төлөлт буцна':'Дарж төлсөн гэж бүртгэнэ'}</span></span><span class="right">${info.paid?'✓ Төлсөн':'Төлсөн гэж тэмдэглэх'}</span></button></div>`;
      return `<article class="debt-card"><div class="debt-card-top"><div class="debt-title-row"><span class="debt-avatar">${h(initials)}</span><div class="debt-title-copy"><div class="debt-name">${h(label)}</div><div class="debt-lender">${months} сарын хуваарь · ${progress}% төлөгдсөн</div></div></div><button class="debt-delete" data-debt-delete="${h(n.id)}" title="Зээл устгах">⌫</button></div><div class="debt-bank-account"><span class="debt-bank-chip">🏦 ${h(bank)}</span><span class="debt-account-chip">▣ ${h(accountName)}</span></div>${n.accountNo?`<div class="debt-account-no">Данс: <b>${h(n.accountNo)}</b></div>`:''}<div class="debt-card-numbers"><div class="debt-number"><span>Үлдэгдэл</span><b>${fmt(remaining)}₮</b></div><div class="debt-number"><span>Сарын төлөлт</span><b class="small">${fmt(n.monthly)}₮</b></div></div><div class="debt-progress-wrap"><div class="debt-progress-row"><span>${progress}% төлөгдсөн</span><b>${fmt(debtPaidTotal(n))}₮ / ${fmt(n.total)}₮</b></div><div class="debt-progress"><i style="width:${progress}%"></i></div></div>${paymentPanel}<details class="debt-schedule"><summary>Сар бүрийн хуваарь <span>${months} сар</span></summary><div class="debt-schedule-list">${debtScheduleRows(n)}</div></details></article>`;
    }
    function renderDebtTracker(){
      const root=$('#tab-debts');if(!root)return;
      state.debts=(Array.isArray(state.debts)?state.debts:[]).map(normalizeDebt);
      const key=debtSelectedKey(),total=allDebtTotal(),remaining=allDebtRemaining(),monthlyDue=debtDueForMonth(key),monthlyPaid=debtPaidForMonth(key),open=state.debtAddOpen;
      root.innerHTML=`<div class="section-stack"><section class="hero debt-hero"><div class="hero-label">НИЙТ ҮЛДЭГДЭЛ ЗЭЭЛ</div><div class="hero-value mono">${fmt(remaining)}<span class="cur">₮</span></div><div class="debt-hero-meta"><span class="debt-hero-chip">Анхны нийт дүн <b>${fmt(total)}₮</b></span><span class="debt-hero-chip">${state.debtMonth}-р сарын төлөх <b>${fmt(monthlyDue)}₮</b></span></div></section><button class="debt-primary" data-act="open-debt-add">＋ Шинэ зээл нэмэх</button>${debtMonthCalendar()}${debtMonthSummary(key)}${open?`<section class="card debt-add-card"><div class="debt-add-heading"><h3>Зээлийн мэдээлэл оруулах</h3><button class="debt-close" data-act="close-debt-add">Болих</button></div><div class="debt-form-grid"><label class="field full"><span>Зээлийн нэр</span><input id="debtName" type="text" placeholder="ж: Автомашины зээл" maxlength="60"></label><label class="field"><span>Банкны нэр</span><input id="debtBankName" type="text" placeholder="ж: Хаан банк" maxlength="60"></label><label class="field"><span>Дансны нэр</span><input id="debtAccountName" type="text" placeholder="ж: Цалингийн данс" maxlength="60"></label><label class="field full"><span>Дансны дугаар <i>(заавал биш)</i></span><input id="debtAccountNo" type="text" inputmode="numeric" placeholder="ж: 5000123456789012" maxlength="34"></label><label class="field"><span>Эхлэх сар</span><input id="debtStartMonth" type="month" value="${debtSelectedKey()}"></label><label class="field"><span>Нийт үлдэгдэл зээл</span><input id="debtTotal" type="number" min="1" inputmode="numeric" placeholder="ж: 12000000"></label><label class="field full"><span>Сарын төлөлт</span><input id="debtMonthly" type="number" min="1" inputmode="numeric" placeholder="ж: 500000"></label></div><div class="debt-form-tip">Банк, дансны нэр болон дансны дугаар нь зээлийн card дээр хамт харагдана. Сарын tab сонгоод, тухайн сарын төлөлт дээр дарж бүртгэдэг.</div><button class="debt-primary" data-act="save-debt" style="width:100%">Зээл хадгалах</button></section>`:''}<section><div class="tab-title-row"><h3 class="card-title">${debtMonthLabel(key)}-ийн зээлүүд</h3><span class="right-info">${monthlyPaid?fmt(monthlyPaid)+'₮ төлсөн':''}${monthlyPaid&&state.debts.length?' · ':''}${state.debts.length} зээл</span></div>${state.debts.length?`<div class="debt-list">${state.debts.map(d=>debtCard(d,key)).join('')}</div>`:`<div class="debt-empty"><div class="debt-empty-icon">₮</div><b>Зээлийн бүртгэл хоосон байна</b><p>Зээлийн нэр, банкны данс, нийт үлдэгдэл, сарын төлөлтөө оруулаад сар бүрийн tab дээрээс төлөлтөө тэмдэглэж яваарай.</p></div>`}</section><p class="debt-note"><b>Тайлбар:</b> Сонгосон сар дээрх төлөлтийг тэмдэглэхэд тухайн дүн нийт үлдэгдлээс автоматаар хасагдана. Төлсөн төлөв дээр дахин дарвал буцааж болно.</p></div>`;
    }
    document.addEventListener('click',e=>{
      const action=e.target.closest('[data-act]')?.dataset.act;
      if(action==='retry-current-tab'){render();return;}
      if(action==='debt-prev-year'){state.debtYear--;render();return;}
      if(action==='debt-next-year'){state.debtYear++;render();return;}
      if(action==='debt-go-current'){const now=new Date();state.debtYear=now.getFullYear();state.debtMonth=now.getMonth()+1;render();return;}
      if(action==='open-debt-add'){state.debtAddOpen=true;render();setTimeout(()=>$('#debtName')?.focus(),0);return;}
      if(action==='close-debt-add'){state.debtAddOpen=false;renderDebtTracker();return;}
      if(action==='save-debt'){
        const name=$('#debtName')?.value.trim()||'',bankName=$('#debtBankName')?.value.trim()||'',accountName=$('#debtAccountName')?.value.trim()||'',accountNo=$('#debtAccountNo')?.value.trim()||'';
        const total=num($('#debtTotal')?.value),monthly=num($('#debtMonthly')?.value),startMonth=$('#debtStartMonth')?.value||debtSelectedKey();
        if(!name||!total||!monthly){alert('Зээлийн нэр, нийт үлдэгдэл болон сарын төлөлтөө оруулна уу.');return;}
        state.debts.push(normalizeDebt({id:'debt-'+Date.now()+'-'+Math.random().toString(36).slice(2,7),name,bankName,accountName,accountNo,total,monthly,startMonth,paid:[]}));
        const [y,m]=startMonth.split('-').map(Number);state.debtYear=y;state.debtMonth=m;saveDebts();state.debtAddOpen=false;render();return;
      }
      const monthTab=e.target.closest('[data-debt-month]');
      if(monthTab){const key=String(monthTab.dataset.debtMonth||'');const m=key.match(/^(\d{4})-(\d{2})$/);if(m){state.debtYear=Number(m[1]);state.debtMonth=Number(m[2]);render();}return;}
      const toggle=e.target.closest('[data-debt-toggle]');
      if(toggle){const id=toggle.dataset.debtToggle,idx=Number(toggle.dataset.debtIndex),d=state.debts.find(x=>x.id===id);if(d&&Number.isInteger(idx)&&idx>=0&&idx<debtMonths(d)){d.paid[idx]=!d.paid[idx];saveDebts();render();}return;}
      const remove=e.target.closest('[data-debt-delete]');
      if(remove){const d=state.debts.find(x=>x.id===remove.dataset.debtDelete);if(d&&confirm(`“${d.name}” зээлийн бүртгэлийг устгах уу?`)){state.debts=state.debts.filter(x=>x.id!==d.id);saveDebts();render();}return;}
    });

    render();
  })();
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./service-worker.js').catch(function (error) {
          console.warn('Service worker registration failed:', error);
        });
      });
    }
  </script>
</body>
</html>
